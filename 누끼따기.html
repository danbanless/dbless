<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>누끼따기 — DBLess</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;background:var(--white);color:var(--black);min-height:100vh;}
.db-page-header{background:var(--white) !important;}
/* ── DBLess 네비게이션 ── */
/* ── DBLess 페이지 헤더 ── */
.wrap{max-width:960px;margin:0 auto;padding:28px 20px;}

.upload-zone{border:2px dashed var(--gray-300);border-radius:10px;padding:36px;text-align:center;cursor:pointer;background:#fff;transition:all .15s;margin-bottom:20px;}
.upload-zone:hover,.upload-zone.dv{border-color:var(--indigo);background:var(--indigo-light);}
.upload-zone input{display:none;}
.uz-icon{font-size:32px;margin-bottom:8px;}
.uz-label{font-size:14px;color:var(--gray-700);}
.uz-sub{font-size:11px;color:var(--gray-500);margin-top:4px;}

.loading{display:none;text-align:center;padding:32px;}
.loading.on{display:block;}
.spinner{width:36px;height:36px;border:3px solid var(--gray-100);border-top-color:var(--indigo);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-size:13px;color:var(--gray-700);}
.load-sub{font-size:11px;color:var(--gray-500);margin-top:4px;}

.result-wrap{display:none;}
.result-wrap.on{display:block;}

/* 캔버스 레이아웃 */
.canvas-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px;}
.canvas-box{background:#fff;border:1px solid var(--gray-100);border-radius:8px;overflow:hidden;}
.canvas-label{font-size:11px;font-weight:700;color:var(--gray-500);padding:8px 12px;border-bottom:1px solid var(--gray-100);letter-spacing:.04em;display:flex;align-items:center;justify-content:space-between;}
.canvas-inner{padding:10px;display:flex;align-items:center;justify-content:center;min-height:220px;background:repeating-conic-gradient(#e8e4dc 0% 25%,#f5f2ec 0% 50%) 0 0/16px 16px;position:relative;}
.canvas-inner canvas{max-width:100%;max-height:320px;border-radius:3px;}

/* 브러시 편집 캔버스 */
#brushCanvas{position:absolute;top:10px;left:10px;max-width:calc(100% - 20px);max-height:320px;border-radius:3px;cursor:crosshair;}
#brushCanvas.restore-mode{cursor:cell;}

/* 컨트롤 박스 */
.controls{background:#fff;border:1px solid var(--gray-100);border-radius:8px;padding:14px 16px;margin-bottom:12px;}
.ctrl-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.ctrl-row:last-child{margin-bottom:0;}
.ctrl-label{font-size:12px;font-weight:700;color:var(--gray-700);width:80px;flex-shrink:0;}
input[type=range]{flex:1;accent-color:var(--indigo);min-width:80px;}
.ctrl-val{font-size:12px;color:var(--indigo);font-weight:700;width:28px;text-align:right;flex-shrink:0;}
.ctrl-hint{font-size:11px;color:var(--gray-500);}

/* 브러시 도구 패널 */
.brush-panel{background:#fff;border:1px solid var(--gray-100);border-radius:8px;padding:14px 16px;margin-bottom:12px;}
.brush-title{font-size:11px;font-weight:700;color:var(--indigo);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px;}
.brush-tools{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.tool-btn{padding:7px 14px;border:1.5px solid var(--gray-100);border-radius:6px;background:#fff;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;color:var(--gray-700);transition:all .12s;}
.tool-btn:hover{border-color:var(--indigo);color:var(--indigo);}
.tool-btn.active-erase{border-color:#b94040;background:#fceaea;color:#b94040;}
.tool-btn.active-restore{border-color:#2e7d4f;background:#ebfbee;color:#2e7d4f;}

/* 배경색 */
.bg-swatches{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.swatch{width:22px;height:22px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:border-color .1s;}
.swatch.on{border-color:var(--indigo);}
.swatch.transparent{background:repeating-conic-gradient(#ccc 0% 25%,#fff 0% 50%) 0 0/10px 10px;border:1.5px solid #ddd;}
.bg-custom{width:28px;height:28px;border:1.5px solid #ddd;border-radius:4px;cursor:pointer;padding:0;}

/* 버튼 */
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.btn{padding:8px 16px;border:none;border-radius:6px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s;}
.btn-p{background:var(--indigo);color:#FFFFFF;}
.btn-p:hover{background:var(--indigo-dark);}
.btn-o{background:transparent;color:var(--indigo);border:1.5px solid var(--indigo);}
.btn-o:hover{background:var(--indigo);color:#fff;}
.btn-g{background:var(--gray-100);color:var(--gray-700);}
.btn-g:hover{background:#ccc;}

.status{font-size:12px;color:var(--gray-500);margin-top:6px;}
.status.ok{color:#2e7d4f;}
.status.err{color:#b94040;}

@media(max-width:600px){.canvas-row{grid-template-columns:1fr;}}
</style>
</head>

<header class="db-page-header">
  <p class="db-page-eyebrow">04 / 누끼따기</p>
  <h1 class="db-page-title">누끼따기</h1>
  <p class="db-page-desc">이미지 배경을 자동으로 제거합니다 · 브라우저에서 처리 · 파일 서버 전송 없음</p>
</header>

<div class="wrap">

  <!-- 업로드 -->
  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <div class="uz-icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
    <div class="uz-label">이미지를 클릭하거나 드래그해서 올리세요</div>
    <div class="uz-sub">JPG · PNG · WEBP 지원</div>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <!-- 로딩 -->
  <div class="loading" id="loadingArea">
    <div class="spinner"></div>
    <div class="load-txt" id="loadTxt">AI 모델 로딩 중...</div>
    <div class="load-sub" id="loadSub">처음 실행 시 잠시 기다려 주세요 (약 10~30초)</div>
  </div>

  <!-- 결과 -->
  <div class="result-wrap" id="resultWrap">
    <div class="canvas-row">
      <div class="canvas-box">
        <div class="canvas-label">원본</div>
        <div class="canvas-inner"><canvas id="canvasOrig"></canvas></div>
      </div>
      <div class="canvas-box">
        <div class="canvas-label">
          <span>편집 결과</span>
          <span id="brushModeLabel" style="font-size:10px;color:var(--gray-500);">브러시 도구를 선택하세요</span>
        </div>
        <div class="canvas-inner" id="editInner">
          <canvas id="canvasResult"></canvas>
          <canvas id="brushCanvas"></canvas>
        </div>
      </div>
    </div>

    <!-- AI 조정 -->
    <div class="controls">
      <div class="ctrl-row">
        <span class="ctrl-label">경계 부드럽게</span>
        <input type="range" id="feather" min="0" max="20" value="3" oninput="applySettings()">
        <span class="ctrl-val" id="featherVal">3</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">투명도 임계값</span>
        <input type="range" id="threshold" min="0" max="100" value="10" oninput="applySettings()">
        <span class="ctrl-val" id="thresholdVal">10</span>
        <span class="ctrl-hint">높을수록 더 많이 지움</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">배경색</span>
        <div class="bg-swatches">
          <div class="swatch transparent on" data-color="transparent" onclick="setBg(this,'transparent')"></div>
          <div class="swatch" style="background:#ffffff" data-color="#ffffff" onclick="setBg(this,'#ffffff')"></div>
          <div class="swatch" style="background:#000000" data-color="#000000" onclick="setBg(this,'#000000')"></div>
          <div class="swatch" style="background:var(--indigo)" data-color="var(--indigo)" onclick="setBg(this,'var(--indigo)')"></div>
          <div class="swatch" style="background:#c8a96e" data-color="#c8a96e" onclick="setBg(this,'#c8a96e')"></div>
          <div class="swatch" style="background:#e8f0ff" data-color="#e8f0ff" onclick="setBg(this,'#e8f0ff')"></div>
          <input type="color" class="bg-custom" id="bgCustom" value="#ffffff" oninput="setBgCustom(this.value)" title="직접 선택">
        </div>
      </div>
    </div>

    <!-- 브러시 도구 -->
    <div class="brush-panel">
      <div class="brush-title">수동 보정 브러시</div>
      <div class="brush-tools">
        <button class="tool-btn" id="btnNone" onclick="setTool('none')">🚫 선택 안 함</button>
        <button class="tool-btn" id="btnErase" onclick="setTool('erase')">🧹 지우개 (배경 제거)</button>
        <button class="tool-btn" id="btnRestore" onclick="setTool('restore')">복원 (되살리기)</button>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">브러시 크기</span>
        <input type="range" id="brushSize" min="5" max="120" value="30" oninput="updateBrushSize()">
        <span class="ctrl-val" id="brushSizeVal">30</span>
        <button class="btn btn-g" style="padding:4px 10px;font-size:11px;margin-left:6px;" onclick="undoBrush()">↩ 되돌리기</button>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-p" onclick="downloadResult()">PNG 다운로드</button>
      <button class="btn btn-o" onclick="reprocess()">AI 다시 처리</button>
      <button class="btn btn-g" onclick="resetAll()">새 이미지</button>
    </div>
    <div class="status" id="statusTxt"></div>
  </div>

</div>

<script type="module">
import { ImageSegmenter, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

let segmenter = null;
let origImageData = null;
let maskData = null;        // AI 마스크 (Float32Array)
let editMask = null;        // 수동 편집된 알파 (Uint8Array)
let currentBg = 'transparent';
let imgW = 0, imgH = 0;
let currentTool = 'none';
let brushRadius = 30;
let isDrawing = false;
let brushHistory = [];      // undo 스택 (editMask 스냅샷)

const canvasOrig   = document.getElementById('canvasOrig');
const canvasResult = document.getElementById('canvasResult');
const brushCanvas  = document.getElementById('brushCanvas');
const ctxOrig      = canvasOrig.getContext('2d');
const ctxResult    = canvasResult.getContext('2d');
const ctxBrush     = brushCanvas.getContext('2d');

// ── 드롭존 ───────────────────────────────────────────────────
const uz = document.getElementById('uploadZone');
uz.addEventListener('dragover', e => { e.preventDefault(); uz.classList.add('dv'); });
uz.addEventListener('dragleave', () => uz.classList.remove('dv'));
uz.addEventListener('drop', e => {
  e.preventDefault(); uz.classList.remove('dv');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
  e.target.value = '';
});

// ── 파일 처리 ────────────────────────────────────────────────
async function handleFile(file) {
  if (!file.type.startsWith('image/')) { setStatus('이미지 파일만 지원합니다.', 'err'); return; }
  uz.style.display = 'none';
  showLoading('이미지 로딩 중...');
  const img = await loadImage(file);
  imgW = img.naturalWidth; imgH = img.naturalHeight;
  canvasOrig.width = imgW; canvasOrig.height = imgH;
  ctxOrig.drawImage(img, 0, 0);
  origImageData = ctxOrig.getImageData(0, 0, imgW, imgH);

  if (!segmenter) {
    setLoadTxt('AI 모델 다운로드 중...', '처음 실행 시 10~30초 소요됩니다');
    try {
      const vision = await FilesetResolver.forVisionTasks(
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
      );
      segmenter = await ImageSegmenter.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite',
          delegate: 'GPU'
        },
        outputCategoryMask: false,
        outputConfidenceMasks: true,
        runningMode: 'IMAGE'
      });
    } catch(e) {
      setStatus('모델 로드 실패: ' + e.message, 'err');
      hideLoading(); uz.style.display = ''; return;
    }
  }
  setLoadTxt('배경 분석 중...', '');
  await runSegmentation(img);
}

async function runSegmentation(img) {
  try {
    const result = segmenter.segment(img);
    const masks = result.confidenceMasks;
    if (!masks || !masks.length) throw new Error('마스크 생성 실패');
    maskData = masks[0].getAsFloat32Array();
    result.close();

    // editMask 초기화 (AI 결과로)
    editMask = new Uint8Array(imgW * imgH);
    brushHistory = [];

    // brushCanvas 크기 동기화
    brushCanvas.width = imgW;
    brushCanvas.height = imgH;
    canvasResult.width = imgW;
    canvasResult.height = imgH;

    hideLoading();
    document.getElementById('resultWrap').classList.add('on');
    applySettings();
    setStatus('완료! 슬라이더로 조정하거나 브러시로 수동 보정하세요.', 'ok');
  } catch(e) {
    setStatus('처리 실패: ' + e.message, 'err');
    hideLoading(); uz.style.display = '';
  }
}

// ── AI 설정 적용 → editMask 재생성 ─────────────────────────
window.applySettings = function() {
  if (!origImageData || !maskData) return;
  const feather   = parseInt(document.getElementById('feather').value);
  const threshold = parseInt(document.getElementById('threshold').value) / 100;
  document.getElementById('featherVal').textContent  = feather;
  document.getElementById('thresholdVal').textContent = document.getElementById('threshold').value;

  // AI 마스크 → editMask
  editMask = new Uint8Array(imgW * imgH);
  for (let i = 0; i < imgW * imgH; i++) {
    const raw = maskData[i];
    let alpha = raw < threshold ? 0 : raw;
    if (feather > 0) alpha = Math.pow(alpha, 1 + (feather / 20) * 2);
    editMask[i] = Math.round(alpha * 255);
  }
  brushHistory = [];
  renderResult();
}

// ── 결과 렌더링 ──────────────────────────────────────────────
function renderResult() {
  canvasResult.width = imgW; canvasResult.height = imgH;
  if (currentBg !== 'transparent') {
    ctxResult.fillStyle = currentBg;
    ctxResult.fillRect(0, 0, imgW, imgH);
  } else {
    ctxResult.clearRect(0, 0, imgW, imgH);
  }
  const src = origImageData.data;
  const out  = ctxResult.getImageData(0, 0, imgW, imgH);
  const od   = out.data;
  for (let i = 0; i < imgW * imgH; i++) {
    const si = i * 4;
    od[si]   = src[si];
    od[si+1] = src[si+1];
    od[si+2] = src[si+2];
    od[si+3] = editMask[i];
  }
  ctxResult.putImageData(out, 0, 0);
}

// ── 배경색 ──────────────────────────────────────────────────
window.setBg = function(el, color) {
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('on'));
  el.classList.add('on');
  currentBg = color;
  renderResult();
}
window.setBgCustom = function(val) {
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('on'));
  currentBg = val;
  renderResult();
}

// ── 브러시 도구 ──────────────────────────────────────────────
window.setTool = function(tool) {
  currentTool = tool;
  document.getElementById('btnNone').className    = 'tool-btn' + (tool==='none'    ? ' active-erase' : '');
  document.getElementById('btnErase').className   = 'tool-btn' + (tool==='erase'   ? ' active-erase' : '');
  document.getElementById('btnRestore').className = 'tool-btn' + (tool==='restore' ? ' active-restore' : '');
  brushCanvas.style.pointerEvents = tool === 'none' ? 'none' : 'auto';
  brushCanvas.className = tool === 'restore' ? 'restore-mode' : '';
  const label = document.getElementById('brushModeLabel');
  if (tool === 'erase')   label.textContent = '🧹 지우개 모드';
  else if (tool === 'restore') label.textContent = '복원 모드';
  else label.textContent = '브러시 도구를 선택하세요';
}

window.updateBrushSize = function() {
  brushRadius = parseInt(document.getElementById('brushSize').value);
  document.getElementById('brushSizeVal').textContent = brushRadius;
}

// brushCanvas 이벤트
function getPos(e) {
  const rect = brushCanvas.getBoundingClientRect();
  const scaleX = imgW / rect.width;
  const scaleY = imgH / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: Math.round((clientX - rect.left) * scaleX),
    y: Math.round((clientY - rect.top)  * scaleY)
  };
}

function paintBrush(x, y) {
  const r = brushRadius;
  const x0 = Math.max(0, x - r), x1 = Math.min(imgW - 1, x + r);
  const y0 = Math.max(0, y - r), y1 = Math.min(imgH - 1, y + r);
  for (let py = y0; py <= y1; py++) {
    for (let px = x0; px <= x1; px++) {
      const dist = Math.sqrt((px - x) ** 2 + (py - y) ** 2);
      if (dist > r) continue;
      // 경계 부드럽게 (feather)
      const strength = Math.max(0, 1 - dist / r);
      const idx = py * imgW + px;
      if (currentTool === 'erase') {
        editMask[idx] = Math.round(editMask[idx] * (1 - strength));
      } else if (currentTool === 'restore') {
        // 원본 AI 마스크 값으로 복원
        const origAlpha = Math.round(maskData[idx] * 255);
        editMask[idx] = Math.min(255, editMask[idx] + Math.round(origAlpha * strength));
      }
    }
  }
  renderResult();
}

brushCanvas.addEventListener('mousedown', e => {
  if (currentTool === 'none') return;
  isDrawing = true;
  // 스냅샷 저장 (undo용)
  brushHistory.push(editMask.slice());
  if (brushHistory.length > 30) brushHistory.shift();
  const pos = getPos(e);
  paintBrush(pos.x, pos.y);
});
brushCanvas.addEventListener('mousemove', e => {
  if (!isDrawing) return;
  const pos = getPos(e);
  paintBrush(pos.x, pos.y);
});
brushCanvas.addEventListener('mouseup', () => isDrawing = false);
brushCanvas.addEventListener('mouseleave', () => isDrawing = false);
// 터치
brushCanvas.addEventListener('touchstart', e => {
  if (currentTool === 'none') return;
  e.preventDefault(); isDrawing = true;
  brushHistory.push(editMask.slice());
  if (brushHistory.length > 30) brushHistory.shift();
  const pos = getPos(e);
  paintBrush(pos.x, pos.y);
}, {passive:false});
brushCanvas.addEventListener('touchmove', e => {
  if (!isDrawing) return;
  e.preventDefault();
  const pos = getPos(e);
  paintBrush(pos.x, pos.y);
}, {passive:false});
brushCanvas.addEventListener('touchend', () => isDrawing = false);

// ── 되돌리기 ────────────────────────────────────────────────
window.undoBrush = function() {
  if (!brushHistory.length) { setStatus('더 이상 되돌릴 수 없어요.', ''); return; }
  editMask = brushHistory.pop();
  renderResult();
  setStatus('되돌렸어요.', 'ok');
}

// ── 다운로드 ────────────────────────────────────────────────
window.downloadResult = function() {
  // 배경 없이 순수 PNG (투명 포함)
  const dlCanvas = document.createElement('canvas');
  dlCanvas.width = imgW; dlCanvas.height = imgH;
  const dlCtx = dlCanvas.getContext('2d');
  const src = origImageData.data;
  const out = dlCtx.createImageData(imgW, imgH);
  for (let i = 0; i < imgW * imgH; i++) {
    const si = i * 4;
    out.data[si]   = src[si];
    out.data[si+1] = src[si+1];
    out.data[si+2] = src[si+2];
    out.data[si+3] = editMask[i];
  }
  dlCtx.putImageData(out, 0, 0);
  const a = document.createElement('a');
  a.download = '누끼_' + Date.now() + '.png';
  a.href = dlCanvas.toDataURL('image/png');
  a.click();
}

// ── 다시처리 / 초기화 ───────────────────────────────────────
window.reprocess = function() {
  if (!origImageData) return;
  const img = new Image();
  canvasOrig.toBlob(async blob => {
    const tempImg = await createImageBitmap(blob);
    const tmp = document.createElement('canvas');
    tmp.width = imgW; tmp.height = imgH;
    tmp.getContext('2d').drawImage(tempImg, 0, 0);
    const srcImg = new Image();
    srcImg.onload = () => { showLoading('다시 분석 중...'); runSegmentation(srcImg); };
    srcImg.src = tmp.toDataURL();
  });
}

window.resetAll = function() {
  uz.style.display = '';
  document.getElementById('resultWrap').classList.remove('on');
  origImageData = null; maskData = null; editMask = null; brushHistory = [];
  document.getElementById('fileInput').value = '';
  setTool('none');
  setStatus('');
}

// ── 유틸 ────────────────────────────────────────────────────
function loadImage(file) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = URL.createObjectURL(file);
  });
}
function showLoading(txt, sub) {
  document.getElementById('loadingArea').classList.add('on');
  setLoadTxt(txt, sub || '');
}
function hideLoading() { document.getElementById('loadingArea').classList.remove('on'); }
function setLoadTxt(txt, sub) {
  document.getElementById('loadTxt').textContent = txt;
  document.getElementById('loadSub').textContent = sub || '';
}
function setStatus(msg, cls) {
  const el = document.getElementById('statusTxt');
  el.textContent = msg;
  el.className = 'status' + (cls ? ' ' + cls : '');
}

// 초기 브러시 비활성
setTool('none');
</script>
</body>
</html>
